---
grails:
    profile: rest-api
    codegen:
        defaultPackage: com.ecole
    gorm:
        reactor:
            # Whether to translate GORM events into Reactor events
            # Disabled by default for performance reasons
            events: false

info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    jmx:
        unique-names: true
    main:
        banner-mode: "off"
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback-spring.xml'
                - '*.properties'
environments:
    development:
        management:
            endpoints:
                enabled-by-default: true
                web:
                    base-path: '/actuator'
                    exposure:
                        include: '*'
    production:
        management:
            endpoints:
                enabled-by-default: false

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            json:
              - application/json
              - text/json   
            hal:
              - application/hal+json
              - application/hal+xml  
            xml:
              - text/xml
              - application/xml                                 
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            js: text/javascript
            rss: application/rss+xml
            text: text/plain
            all: '*/*'
    cors:
        enabled: true
        mappings:
            '/**':
                allowedOrigins:
                    - "http://localhost:3000"
                    - "http://localhost:4200"
                allowedMethods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - OPTIONS
                allowedHeaders: "*"

    plugin:
        springsecurity:
            securityConfigType: "Annotation"
            rejectifNoRule: false
            fii:
                rejectPublicInvocations: false
                active: true

                userLookup:
                    userDomainClassName: 'com.ecole.User'
                    authorityJoinClassName: 'com.ecole.UserRole'
                authority:
                    className: 'com.ecole.Role'

                password:
                    algorithm: 'bcrypt'
                controllerAnnotations:
                    staticRules:
                        - pattern: '/'
                          access: [ 'permitAll' ]
                        - pattern: '/error'
                          access: [ 'permitAll' ]
                        - pattern: '/api/login'
                          access: [ 'permitAll' ]
                        - pattern: '/api/demandes'
                          access: [ 'permitAll' ]

                    filterChain:
                        chainMap:
                            - pattern: '/assets/**'
                              filters: 'none'
                            - pattern: '/*/js/*'
                              filters: 'none'
                            - pattern: '/*/css/*'
                              filters: 'none'
                            - pattern: '/*/images/*'
                              filters: 'none'
                            - pattern: '/**/favicon.ico'
                              filters: 'none'
                            - pattern: '/api/login'
                              filters: 'JOINED_FILTERS,-authenticationProcessingFilter,-securityContextPersistenceFilter,-rememberMeAuthenticationFilter'
                            - pattern: '/api/**'
                              filters: 'JOINED_FILTERS,-anonymousAuthenticationFilter,-exceptionTranslationFilter,-authenticationProcessingFilter,-securityContextPersistenceFilter'
                            - pattern: '/**'
                              filters: 'JOINED_FILTERS,-restTokenValidationFilter,-restExceptionTranslationFilter'

                rest:
                    login:
                        active: true
                        endpointUrl: '/api/login'
                        failureStatusCode: 401
                        useJsonCredentials: true
                    logout:
                        endpointUrl: '/api/logout'
                    token:
                        validation:
                            enableAnonymousAccess: true
                        storage:
                            jwt:
                                secret: 'MonSecretJWTTresLongEtDifficileADeviner123456789'
                                expiration: 86400

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.h2.Driver
    username: sa
    password: ''

environments:
    development:
        dataSource:
            dbCreate: create-drop
            url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    test:
        dataSource:
            dbCreate: update
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    production:
        dataSource:
            dbCreate: none
            url: jdbc:h2:./prodDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
            properties:
                jmxEnabled: true
                initialSize: 5
                maxActive: 50
                minIdle: 5
                maxIdle: 25
                maxWait: 10000
                maxAge: 600000
                timeBetweenEvictionRunsMillis: 5000
                minEvictableIdleTimeMillis: 60000
                validationQuery: SELECT 1
                validationQueryTimeout: 3
                validationInterval: 15000
                testOnBorrow: true
                testWhileIdle: true
                testOnReturn: false
                jdbcInterceptors: ConnectionState
                defaultTransactionIsolation: 2 # TRANSACTION_READ_COMMITTED
